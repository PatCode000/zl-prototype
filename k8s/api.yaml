apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: render-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: render-api:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URL
              value: mongodb://mongo:27017
            - name: MONGO_DB
              value: render_platform
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: render-platform
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
  type: NodePort
