apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: render-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: render-gateway:loadbalancer
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: API_URL
              value: http://api:8000
            - name: PORT
              value: "8080"
            - name: ALLOWED_ORIGINS
              value: http://localhost:5173
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: render-platform
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer
