services:
  mongo:
    image: mongo:7
    container_name: render-mongo
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: ./services/api
    container_name: render-api
    environment:
      MONGO_URL: ${MONGO_URL}
      MONGO_DB: ${MONGO_DB}
    depends_on:
      - mongo
    ports:
      - "${API_PORT}:8000"

  gateway:
    build: ./services/gateway
    container_name: render-gateway
    environment:
      API_URL: ${API_URL}
      PORT: ${GATEWAY_PORT}
    depends_on:
      - api
    ports:
      - "${GATEWAY_PORT}:8080"

  unity-renderer:
    build: ./services/unity-renderer
    container_name: unity-renderer
    environment:
      SIGNALING_URL: ${SIGNALING_URL}
      UNITY_USE_XVFB: "1"
      XVFB_SCREEN: "1280x720x24"
    depends_on:
      - gateway

  frontend:
    build: ./apps/frontend
    container_name: render-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_GATEWAY_URL: ${VITE_GATEWAY_URL}
    depends_on:
      - api
      - gateway
    ports:
      - "${FRONTEND_PORT}:5173"

volumes:
  mongo_data:
