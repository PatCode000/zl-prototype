services:
  mongo:
    image: mongo:7
    container_name: render-mongo
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: ./services/api
    container_name: render-api
    environment:
      MONGO_URL: ${MONGO_URL}
      MONGO_DB: ${MONGO_DB}
    depends_on:
      - mongo
    ports:
      - "${API_PORT}:8000"

  gateway:
    build: ./services/gateway
    container_name: render-gateway
    environment:
      API_URL: ${API_URL}
      PORT: ${GATEWAY_PORT}
    depends_on:
      - api
    ports:
      - "${GATEWAY_PORT}:8080"

  mock-render-node:
    build: ./services/mock-render-node
    container_name: mock-render-node
    environment:
      GATEWAY_URL: ${GATEWAY_URL}
      NODE_ID: ${NODE_ID}
    depends_on:
      - gateway

  frontend:
    build: ./apps/frontend
    container_name: render-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_GATEWAY_URL: ${VITE_GATEWAY_URL}
    depends_on:
      - api
      - gateway
    ports:
      - "${FRONTEND_PORT}:5173"

volumes:
  mongo_data:
